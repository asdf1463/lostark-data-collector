name: Daily LostArk Data Collect

on:
  schedule:
    - cron: '00 16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run script
        env:
          LOSTARK_API_KEY: ${{ secrets.LOSTARK_API_KEY }}
          TZ: Asia/Seoul
        run: python 자동가격.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add lostark_ts_data.db
          git commit -m "Update LostArk Data: $(date)" || echo "No changes to commit"
          git push
