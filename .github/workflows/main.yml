name: Daily LostArk Data Collect

on:
  schedule:
    - cron: '0 14 * * *' # 한국 시간 매일 오후 11시 실행
  workflow_dispatch: # 수동 실행 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests pandas
        
      - name: Run script
        env:
          LOSTARK_API_KEY: ${{ secrets.LOSTARK_API_KEY }}
        run: python 자동가격.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "Data Collector"
          git config --global user.email "action@github.com"
          git add lostark_ts_data.db
          git commit -m "Update LostArk Data: $(date)" || echo "No changes to commit"
          git push
